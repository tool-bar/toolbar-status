owner: tool-bar
repo: toolbar-status
user-agent: toolbar-status

sites:
  - name: Toolbar API Health
    slug: toolbar-api-health
    url: https://www.toolbar.no/api/health
    type: globalping
    location: World
    maxResponseTime: 5000
    __dangerous__body_down_if_text_missing: '"status":"ok"'

  - name: Toolbar Homepage
    slug: toolbar-homepage
    url: https://www.toolbar.no/
    type: globalping
    location: World
    maxResponseTime: 5000

  - name: Toolbar Apex Redirect
    slug: toolbar-apex-redirect
    url: https://toolbar.no/
    maxResponseTime: 5000

status-website:
  cname: status.toolbar.no
  logoUrl: https://www.toolbar.no/toolbar-logo.png
  name: Toolbar Status
  introTitle: "Toolbar Status"
  introMessage: Live availability for Toolbar production services.
  navbar:
    - title: Status
      href: /
    - title: App
      href: https://www.toolbar.no/
    - title: GitHub
      href: https://github.com/tool-bar/toolbar-status

workflowSchedule:
  uptime: "*/5 * * * *"
  responseTime: "7 23 * * *"
  graphs: "17 0 * * *"
  summary: "37 0 * * *"
  staticSite: "27 1 * * *"
  updateTemplate: "47 0 * * *"
  updates: "7 3 * * *"
